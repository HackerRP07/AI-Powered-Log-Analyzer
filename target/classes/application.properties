spring.application.name=log-analyser
server.port=8080

# Local test-ready database (no external setup required)
spring.datasource.url=DB_URL
spring.datasource.username=username
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema is managed manually via SQL scripts under db/scripts
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.max-file-size-mb=20

# OpenAI settings
openai.api-key=${OPENAI_API_KEY}
openai.base-url=https://api.openai.com
openai.model=gpt-4.1-mini

# OCR settings (local Tesseract)
app.ocr.command=C:\\Program Files\\Tesseract-OCR\\tesseract.exe
app.ocr.language=eng
app.ocr.timeout-seconds=30

logging.level.root=ERROR
spring.main.banner-mode=off
